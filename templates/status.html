<!-- templates/status.html — Bootstrap 5 status web UI -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>memex-redux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex align-items-center mb-4">
      <h1 class="h4 mb-0 me-3">memex-redux</h1>
      <span id="refresh-badge" class="badge bg-secondary">refreshing…</span>
    </div>

    <!-- Server status -->
    <div class="card mb-3">
      <div class="card-header fw-semibold">Server status</div>
      <div class="card-body">
        <dl class="row mb-0" id="server-status">
          <dt class="col-sm-3">Started</dt><dd class="col-sm-9" id="stat-start">—</dd>
          <dt class="col-sm-3">Uptime</dt><dd class="col-sm-9" id="stat-uptime">—</dd>
          <dt class="col-sm-3">Database</dt><dd class="col-sm-9" id="stat-db">—</dd>
        </dl>
      </div>
    </div>

    <!-- Registered tools -->
    <div class="card mb-3">
      <div class="card-header fw-semibold">Registered tools <span class="badge bg-primary" id="tool-count">0</span></div>
      <div class="card-body p-0">
        <table class="table table-sm mb-0" id="tools-table">
          <thead><tr><th>Name</th><th>Description</th></tr></thead>
          <tbody id="tools-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Recent activity -->
    <div class="card">
      <div class="card-header fw-semibold">Recent activity</div>
      <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0" id="activity-table">
          <thead><tr><th>Time</th><th>Tool</th><th>Params</th><th>Duration</th><th>Result</th></tr></thead>
          <tbody id="activity-body"></tbody>
        </table>
      </div>
    </div>
  </div>
  <script src="/static/app.js"></script>
</body>
</html>
