<!-- templates/status.html — Bootstrap 5 status web UI -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>memex-redux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>

  <div class="page-header">
    <div class="container">
      <div class="d-flex align-items-center justify-content-between">
        <div>
          <h1 class="mb-0">memex-redux</h1>
          <span class="subtitle">Personal data gateway</span>
        </div>
        <span id="refresh-badge" class="badge bg-secondary">refreshing…</span>
      </div>
    </div>
  </div>

  <div class="container pb-4">

    <!-- Status row -->
    <div class="row g-3 mb-3">

      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">Server</div>
          <div class="card-body">
            <div class="stat-grid">
              <span class="stat-label">Started</span>
              <span class="stat-value" id="stat-start">—</span>
              <span class="stat-label">Uptime</span>
              <span class="stat-value" id="stat-uptime">—</span>
              <span class="stat-label">Total calls</span>
              <span class="stat-value" id="stat-total">—</span>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card h-100">
          <div class="card-header">Connections</div>
          <div class="card-body">
            <div class="stat-grid" id="connections-grid">
              <span class="stat-label">Database</span>
              <span class="stat-value" id="stat-db">—</span>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Registered tools -->
    <div class="card mb-3">
      <div class="card-header d-flex align-items-center gap-2">
        Registered tools
        <span class="badge bg-primary rounded-pill" id="tool-count">0</span>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm mb-0" id="tools-table">
          <thead>
            <tr>
              <th class="ps-3">Name</th>
              <th>Description</th>
              <th class="text-end pe-3">Recent calls</th>
            </tr>
          </thead>
          <tbody id="tools-body"></tbody>
        </table>
      </div>
    </div>

    <!-- Recent activity -->
    <div class="card">
      <div class="card-header d-flex align-items-center gap-2">
        Recent activity
        <span class="badge bg-danger rounded-pill" id="error-count" style="display:none">0 errors</span>
      </div>
      <div class="card-body p-0">
        <table class="table table-sm table-hover mb-0" id="activity-table">
          <thead>
            <tr>
              <th class="ps-3">Time</th>
              <th>Tool</th>
              <th>Params</th>
              <th>Duration</th>
              <th class="pe-3">Result</th>
            </tr>
          </thead>
          <tbody id="activity-body"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
